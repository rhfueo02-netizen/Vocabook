<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="단어장">
<title>단어장</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --pink:#E8789A;--pink-light:#FDF0F4;--pink-mid:#F5C6D6;--pink-dark:#C45075;
  --bg:#FFF8FA;--card:#ffffff;--text:#2d1a22;--text2:#8a5a6a;--text3:#c4a0b0;--border:#F0D0DC;
}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
.app{max-width:480px;margin:0 auto;padding:0 0 5rem}
.header{background:var(--card);border-bottom:1px solid var(--border);padding:1rem 1rem 0;position:sticky;top:0;z-index:10}
.header-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:0.75rem}
.header h1{font-size:20px;font-weight:700;color:var(--pink-dark)}
.header-btns{display:flex;gap:8px}
.upload-btn{font-size:12px;color:var(--pink);border:1px solid var(--pink);border-radius:20px;padding:5px 11px;cursor:pointer;background:none;font-family:inherit}
.paste-btn{font-size:12px;color:var(--pink-dark);border:1px solid var(--pink-mid);border-radius:20px;padding:5px 11px;cursor:pointer;background:var(--pink-light);font-family:inherit}
.nav{display:flex;gap:0}
.nav-btn{flex:1;padding:10px 0;font-size:13px;font-weight:600;cursor:pointer;border:none;background:none;color:var(--text3);font-family:inherit;border-bottom:2.5px solid transparent;transition:all 0.15s}
.nav-btn.active{color:var(--pink);border-bottom-color:var(--pink)}
.date-row{background:var(--card);padding:10px 1rem;border-bottom:1px solid var(--border);display:flex;gap:8px;overflow-x:auto;scrollbar-width:none}
.date-row::-webkit-scrollbar{display:none}
.dtab{flex-shrink:0;padding:5px 14px;border-radius:20px;font-size:12px;cursor:pointer;border:1px solid var(--border);background:var(--card);color:var(--text2);font-family:inherit;transition:all 0.15s}
.dtab.active{background:var(--pink);color:#fff;border-color:var(--pink)}
.content{padding:1rem}
.search-wrap{position:relative;margin-bottom:1rem}
.search-wrap input{width:100%;padding:9px 12px 9px 36px;border-radius:20px;border:1px solid var(--border);background:var(--card);font-size:14px;color:var(--text);font-family:inherit;outline:none}
.search-wrap input:focus{border-color:var(--pink-mid)}
.search-icon{position:absolute;left:12px;top:50%;transform:translateY(-50%);font-size:15px;color:var(--text3)}
.stats{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:1rem}
.stat{background:var(--card);border-radius:12px;padding:10px 12px;border:1px solid var(--border)}
.stat-label{font-size:10px;color:var(--text3);margin-bottom:3px;font-weight:600;text-transform:uppercase;letter-spacing:0.5px}
.stat-val{font-size:18px;font-weight:700;color:var(--pink-dark)}
.stat.quiz-on{background:var(--pink);border-color:var(--pink);cursor:pointer}
.stat.quiz-on .stat-label{color:rgba(255,255,255,0.7)}
.stat.quiz-on .stat-val{color:#fff;font-size:14px}
.stat.quiz-off{cursor:pointer}
.card{background:var(--card);border-radius:14px;padding:14px 15px;margin-bottom:9px;border:1px solid var(--border);transition:border-color 0.15s}
.card:active{opacity:0.85}
.card.open,.card.revealed{border-color:var(--pink-mid)}
.card-header{display:flex;align-items:flex-start;gap:8px}
.card-body{flex:1;cursor:pointer}
.card-no{font-size:10px;color:var(--text3);margin-bottom:3px;font-weight:600}
.card-row{display:flex;justify-content:space-between;align-items:flex-start;gap:8px}
.card-word{font-size:15px;font-weight:700;flex:1;line-height:1.4;color:var(--text)}
.card-meaning{font-size:13px;font-weight:600;color:var(--pink);flex-shrink:0}
.card-hint{font-size:13px;color:var(--text3);flex-shrink:0}
.card-detail{margin-top:10px;padding-top:10px;border-top:1px solid var(--pink-light);display:none}
.card.open .card-detail,.card.revealed .card-detail{display:block}
.card-example{font-size:13px;color:var(--text);margin-bottom:3px;line-height:1.6}
.card-trans{font-size:12px;color:var(--text2);line-height:1.5}
.bm-btn{flex-shrink:0;width:32px;height:32px;border:none;background:none;cursor:pointer;font-size:18px;display:flex;align-items:center;justify-content:center;border-radius:50%;transition:background 0.1s;margin-top:-2px}
.bm-btn:active{background:var(--pink-light)}
.empty{text-align:center;padding:4rem 1rem;cursor:pointer}
.empty-icon{font-size:48px;margin-bottom:14px}
.empty p{font-size:15px;color:var(--text2);margin-bottom:4px}
.empty span{font-size:12px;color:var(--text3)}
.no-result{text-align:center;padding:3rem 1rem;color:var(--text3);font-size:14px}
.loading{text-align:center;padding:3rem 1rem;color:var(--text3);font-size:14px}
.bm-date-group{margin-bottom:1.5rem}
.bm-date-label{font-size:12px;font-weight:700;color:var(--pink);margin-bottom:8px;display:flex;align-items:center;gap:6px}
.bm-date-label::after{content:'';flex:1;height:1px;background:var(--pink-mid)}
.bm-empty{text-align:center;padding:4rem 1rem}
.bm-empty-icon{font-size:48px;margin-bottom:14px}
.bm-empty p{font-size:15px;color:var(--text2)}

/* Paste modal */
.overlay{position:fixed;inset:0;background:rgba(45,26,34,0.4);z-index:100;display:flex;align-items:flex-end;justify-content:center}
.modal{background:var(--card);border-radius:20px 20px 0 0;padding:1.25rem 1rem 2rem;width:100%;max-width:480px}
.modal-title{font-size:16px;font-weight:700;color:var(--pink-dark);margin-bottom:4px}
.modal-sub{font-size:12px;color:var(--text3);margin-bottom:12px}
.modal textarea{width:100%;height:180px;border:1px solid var(--border);border-radius:12px;padding:10px 12px;font-size:13px;font-family:inherit;color:var(--text);background:var(--bg);resize:none;outline:none}
.modal textarea:focus{border-color:var(--pink-mid)}
.modal-btns{display:flex;gap:8px;margin-top:10px}
.modal-ok{flex:1;padding:11px;border-radius:20px;border:none;background:var(--pink);color:#fff;font-size:14px;font-weight:600;cursor:pointer;font-family:inherit}
.modal-cancel{padding:11px 18px;border-radius:20px;border:1px solid var(--border);background:none;color:var(--text2);font-size:14px;cursor:pointer;font-family:inherit}

.speak-btn{flex-shrink:0;width:28px;height:28px;border:none;background:none;cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center;border-radius:50%;transition:background 0.1s;color:var(--text3)}
.speak-btn:active{background:var(--pink-light)}
.card-actions{display:flex;align-items:center;gap:2px;margin-top:-2px}

.ai-input{width:100%;padding:10px 12px;border-radius:12px;border:1px solid var(--border);font-size:15px;font-family:inherit;color:var(--text);background:var(--bg);outline:none;margin-bottom:10px}
.ai-input:focus{border-color:var(--pink)}
.ai-result{background:var(--pink-light);border-radius:12px;padding:12px;margin-bottom:10px;display:none}
.ai-result-row{display:flex;justify-content:space-between;margin-bottom:4px}
.ai-result-word{font-size:15px;font-weight:700;color:var(--text)}
.ai-result-meaning{font-size:14px;font-weight:600;color:var(--pink-dark)}
.ai-result-example{font-size:12px;color:var(--text2);margin-top:4px}
.ai-result-trans{font-size:12px;color:var(--text3)}
.ai-loading{text-align:center;padding:12px;color:var(--text3);font-size:13px;display:none}

/* Calendar */
.cal-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:1rem}
.cal-title{font-size:16px;font-weight:700;color:var(--pink-dark)}
.cal-nav{background:none;border:1px solid var(--border);border-radius:20px;padding:5px 12px;font-size:13px;cursor:pointer;color:var(--text2);font-family:inherit}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;margin-bottom:1rem}
.cal-day-label{text-align:center;font-size:11px;font-weight:600;color:var(--text3);padding:4px 0}
.cal-day{text-align:center;padding:6px 2px;border-radius:8px;font-size:13px;cursor:pointer;transition:background 0.1s;min-height:42px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px}
.cal-day.empty{cursor:default}
.cal-day.has-words{background:var(--pink-light);color:var(--pink-dark);font-weight:600}
.cal-day.today{border:1.5px solid var(--pink)}
.cal-day.selected{background:var(--pink);color:#fff}
.cal-day.selected .cal-count{color:rgba(255,255,255,0.8)}
.cal-count{font-size:10px;color:var(--pink);font-weight:600}
.cal-day.selected .cal-count{color:rgba(255,255,255,0.8)}
.cal-detail{background:var(--card);border-radius:12px;padding:14px;border:1px solid var(--border)}
.cal-detail-title{font-size:13px;font-weight:700;color:var(--pink-dark);margin-bottom:10px}
.cal-word-item{display:flex;justify-content:space-between;padding:7px 0;border-bottom:1px solid var(--pink-light);font-size:13px}
.cal-word-item:last-child{border-bottom:none}

input[type=file]{display:none}
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <div class="header-top">
      <h1>🩷 단어장</h1>
      <div class="header-btns">
        <button class="paste-btn" onclick="showAI()">✨ AI 추가</button>
        <button class="paste-btn" onclick="showPaste()">✏️ 붙여넣기</button>
        <label class="upload-btn">
          📎 엑셀
          <input type="file" id="fileInput" accept=".xlsx,.xls,.csv">
        </label>
        <button class="upload-btn" onclick="exportToWidget()" style="font-size:12px">📲 위젯</button>
      </div>
    </div>
    <div class="nav">
      <button class="nav-btn active" id="navWords" onclick="switchTab('words')">단어</button>
      <button class="nav-btn" id="navBookmarks" onclick="switchTab('bookmarks')">북마크 🩷</button>
      <button class="nav-btn" id="navCalendar" onclick="switchTab('calendar')">달력 📅</button>
    </div>
  </div>
  <div id="dateRow" class="date-row"></div>
  <div class="content" id="mainContent"><div class="loading">불러오는 중...</div></div>
</div>

<!-- AI modal -->
<div class="overlay" id="aiOverlay" style="display:none">
  <div class="modal">
    <div class="modal-title">✨ AI 단어 추가</div>
    <div class="modal-sub">단어나 구문을 입력하면 뜻+예문+해석을 자동으로 찾아줘요</div>
    <input class="ai-input" id="aiInput" type="text" placeholder="예: actually, I see what you mean, ambitious...">
    <div class="ai-loading" id="aiLoading">🔍 찾는 중...</div>
    <div class="ai-result" id="aiResult">
      <div class="ai-result-row">
        <div class="ai-result-word" id="aiWord"></div>
        <div class="ai-result-meaning" id="aiMeaning"></div>
      </div>
      <div class="ai-result-example" id="aiExample"></div>
      <div class="ai-result-trans" id="aiTrans"></div>
    </div>
    <div class="modal-btns">
      <button class="modal-cancel" onclick="hideAI()">취소</button>
      <button class="modal-ok" id="aiSearchBtn" onclick="aiSearch()">뜻 찾기</button>
      <button class="modal-ok" id="aiSaveBtn" onclick="aiSave()" style="display:none;background:var(--pink-dark)">저장</button>
    </div>
  </div>
</div>

<!-- Paste modal -->
<div class="overlay" id="pasteOverlay" style="display:none">
  <div class="modal">
    <div class="modal-title">텍스트 붙여넣기</div>
    <div class="modal-sub">챗GPT 표를 그대로 복사해서 붙여넣으세요</div>
    <textarea id="pasteArea" placeholder="| No | Expression / Word | 뜻 | Example | 해석 |
| -- | -- | -- | -- | -- |
| 1  | actually | 사실은 | Actually, I agree. | 사실 나도 동의해. |"></textarea>
    <div class="modal-btns">
      <button class="modal-cancel" onclick="hidePaste()">취소</button>
      <button class="modal-ok" onclick="parsePaste()">저장하기</button>
    </div>
  </div>
</div>

<script>
const DB_NAME='vocab_db3',DB_VER=1,STORE='days';
let db=null;
function openDB(){
  return new Promise((res,rej)=>{
    const r=indexedDB.open(DB_NAME,DB_VER);
    r.onupgradeneeded=e=>e.target.result.createObjectStore(STORE,{keyPath:'date'});
    r.onsuccess=e=>{db=e.target.result;res(db)};
    r.onerror=()=>rej(r.error);
  });
}
function dbGetAll(){
  return new Promise((res,rej)=>{
    const r=db.transaction(STORE,'readonly').objectStore(STORE).getAll();
    r.onsuccess=()=>res(r.result);r.onerror=()=>rej(r.error);
  });
}
function dbPut(rec){
  return new Promise((res,rej)=>{
    const r=db.transaction(STORE,'readwrite').objectStore(STORE).put(rec);
    r.onsuccess=()=>res();r.onerror=()=>rej(r.error);
  });
}

let data={},curDate=null,curTab='words',quizMode=false,search='',openIdx=null,revealed={};

function todayStr(){return new Date().toISOString().slice(0,10)}
function fmtDate(iso){const d=new Date(iso);return(d.getMonth()+1)+'/'+d.getDate()}
function getDates(){return Object.keys(data).sort((a,b)=>b.localeCompare(a))}
function getDay(date){if(!data[date])data[date]={words:[],bookmarks:{}};return data[date]}
async function saveDate(date){await dbPut({date,words:getDay(date).words,bookmarks:getDay(date).bookmarks})}

// ── Paste modal ────────────────────────────────────────
function showPaste(){
  document.getElementById('pasteArea').value='';
  document.getElementById('pasteOverlay').style.display='flex';
}
function hidePaste(){document.getElementById('pasteOverlay').style.display='none'}

function parsePaste(){
  const raw=document.getElementById('pasteArea').value.trim();
  if(!raw){hidePaste();return}
  const parsed=[];
  const lines=raw.split('\n');
  lines.forEach(function(line){
    const trimmed=line.trim();
    if(!trimmed)return;
    let cells;
    // 파이프 표 형식: | a | b | c |
    if(trimmed.startsWith('|')){
      cells=trimmed.split('|').map(c=>c.trim()).filter((_,i,a)=>i>0&&i<a.length-1);
    } else {
      // 탭 구분 형식
      cells=trimmed.split('\t').map(c=>c.trim());
    }
    if(cells.length<2)return;
    const no=cells[0],word=cells[1],meaning=cells[2]||'',example=cells[3]||'',translation=cells[4]||'';
    if(!word)return;
    // 헤더 줄 건너뜀
    if(word==='Expression / Word'||word==='Expression'||word==='Word'||word==='--')return;
    if(no==='No'||no==='--'||no.replace(/-/g,'').trim()==='')return;
    // 숫자가 아닌 첫 컬럼은 단어 데이터가 아님
    if(isNaN(Number(no)))return;
    parsed.push({no:String(no),word,meaning,example,translation});
  });
  if(parsed.length===0){alert('파싱할 수 있는 단어가 없어요. 형식을 확인해주세요.');return}
  const today=todayStr();
  const existing=getDay(today);
  const existingNos=new Set(existing.words.map(function(w){return w.no}));
  const newWords=parsed.filter(function(w){return!existingNos.has(w.no)});
  if(existing.words.length+newWords.length>150){alert('하루 최대 150개까지 저장할 수 있어요.');return}
  existing.words=existing.words.concat(newWords);
  saveDate(today).then(function(){
    curDate=today;search='';openIdx=null;revealed={};quizMode=false;
    hidePaste();
    if(newWords.length<parsed.length){alert(newWords.length+'개 추가됨 (중복 '+(parsed.length-newWords.length)+'개 제외)');}
    render();
  });
}

// ── Tab / date ─────────────────────────────────────────
function switchTab(tab){
  curTab=tab;search='';openIdx=null;revealed={};quizMode=false;
  document.getElementById('navWords').classList.toggle('active',tab==='words');
  document.getElementById('navBookmarks').classList.toggle('active',tab==='bookmarks');
  document.getElementById('navCalendar').classList.toggle('active',tab==='calendar');
  renderDateRow();renderMain();
}
function selectDate(d){curDate=d;search='';openIdx=null;revealed={};quizMode=false;render()}
function doSearch(q){search=q;openIdx=null;renderMain()}
function toggleQuiz(){quizMode=!quizMode;revealed={};openIdx=null;renderMain()}
function tapCard(i){if(quizMode){revealed[i]=true;renderMain()}else{openIdx=openIdx===i?null:i;renderMain()}}
async function toggleBookmark(date,idx,e){
  e.stopPropagation();
  const day=getDay(date);
  day.bookmarks[idx]=!day.bookmarks[idx];
  await saveDate(date);render();
}

// ── Render ─────────────────────────────────────────────
function render(){renderDateRow();renderMain()}
function renderDateRow(){
  const el=document.getElementById('dateRow');
  const dates=getDates();
  if(curTab==='bookmarks'||curTab==='calendar'||dates.length===0){el.style.display='none';return}
  el.style.display='flex';
  el.innerHTML=dates.map(d=>'<button class="dtab '+(d===curDate?'active':'')+'" onclick="selectDate(\''+d+'\')">'+fmtDate(d)+'</button>').join('');
}
function renderMain(){
  const el=document.getElementById('mainContent');
  if(curTab==='bookmarks'){renderBookmarks(el);return}
  if(curTab==='calendar'){renderCalendar(el);return}
  renderWords(el);
}
function renderWords(el){
  const dates=getDates();
  if(dates.length===0){
    el.innerHTML='<div class="empty"><div class="empty-icon">🩷</div><p>단어를 추가해보세요</p><span>상단 붙여넣기 또는 엑셀 업로드</span></div>';
    return;
  }
  const day=getDay(curDate);
  const words=day.words;
  const filtered=words.filter(w=>{
    if(!search)return true;
    const q=search.toLowerCase();
    return(w.word||'').toLowerCase().includes(q)||(w.meaning||'').includes(q);
  });
  let html='<div class="stats">'
    +'<div class="stat"><div class="stat-label">단어</div><div class="stat-val">'+words.length+'</div></div>'
    +'<div class="stat"><div class="stat-label">북마크</div><div class="stat-val" style="color:var(--pink)">'+Object.values(day.bookmarks).filter(Boolean).length+'</div></div>'
    +'<div class="stat '+(quizMode?'quiz-on':'quiz-off')+'" onclick="toggleQuiz()"><div class="stat-label">모드</div><div class="stat-val">'+(quizMode?'퀴즈 ✓':'퀴즈')+'</div></div>'
    +'</div>'
    +'<div class="search-wrap"><span class="search-icon">🔍</span>'
    +'<input type="text" placeholder="단어 검색..." value="'+search.replace(/"/g,'&quot;')+'" oninput="doSearch(this.value)"></div>';
  if(filtered.length===0){html+='<div class="no-result">검색 결과가 없어요</div>';}
  else{
    filtered.forEach(function(w,i){
      const realIdx=words.indexOf(w);
      const isOpen=!quizMode&&openIdx===i;
      const isRevealed=quizMode&&revealed[i];
      const isBm=day.bookmarks[realIdx]||false;
      var wordEsc=w.word.replace(/'/g,"\\'");
      var exEsc=(w.example||'').replace(/'/g,"\\'");
      html+='<div class="card '+(isOpen?'open ':'')+( isRevealed?'revealed':'')+'">'
        +'<div class="card-header">'
        +'<div class="card-body" onclick="tapCard('+i+')">'
        +'<div class="card-no">#'+w.no+'</div>'
        +'<div class="card-row"><div class="card-word">'+w.word+'</div>'
        +(quizMode&&!isRevealed?'<div class="card-hint">탭해서 확인</div>':'<div class="card-meaning">'+w.meaning+'</div>')
        +'</div>'
        +(w.example?'<div class="card-detail"><div class="card-example">'+w.example+'</div>'+(w.translation?'<div class="card-trans">'+w.translation+'</div>':'')+'</div>':'')
        +'</div>'
        +'<div class="card-actions">'
        +'<button class="speak-btn" onclick="speak(\''+wordEsc+'\',\''+exEsc+'\',event)" title="발음 듣기">🔊</button>'
        +'<button class="bm-btn" onclick="toggleBookmark(\''+curDate+'\','+realIdx+',event)">'+(isBm?'🩷':'🤍')+'</button>'
        +'</div>'
        +'</div></div>';
    });
  }
  el.innerHTML=html;
}
function renderBookmarks(el){
  const dates=getDates();
  let hasAny=false,html='';
  dates.forEach(function(date){
    const day=getDay(date);
    const bmWords=day.words.filter((_,i)=>day.bookmarks[i]);
    if(bmWords.length===0)return;
    hasAny=true;
    html+='<div class="bm-date-group"><div class="bm-date-label">'+fmtDate(date)+'</div>';
    bmWords.forEach(function(w){
      const realIdx=day.words.indexOf(w);
      var wordEsc=w.word.replace(/'/g,"\\'");
      var exEsc=(w.example||'').replace(/'/g,"\\'");
      html+='<div class="card"><div class="card-header">'
        +'<div class="card-body" onclick="this.parentElement.parentElement.classList.toggle(\'open\')">'
        +'<div class="card-no">#'+w.no+'</div>'
        +'<div class="card-row"><div class="card-word">'+w.word+'</div><div class="card-meaning">'+w.meaning+'</div></div>'
        +(w.example?'<div class="card-detail"><div class="card-example">'+w.example+'</div>'+(w.translation?'<div class="card-trans">'+w.translation+'</div>':'')+'</div>':'')
        +'</div>'
        +'<div class="card-actions">'
        +'<button class="speak-btn" onclick="speak(\''+wordEsc+'\',\''+exEsc+'\',event)">🔊</button>'
        +'<button class="bm-btn" onclick="toggleBookmark(\''+date+'\','+realIdx+',event)">🩷</button>'
        +'</div>'
        +'</div></div>';
    });
    html+='</div>';
  });
  if(!hasAny)html='<div class="bm-empty"><div class="bm-empty-icon">🩷</div><p>단어 카드의 🤍를 탭해서<br>북마크에 추가하세요</p></div>';
  el.innerHTML=html;
}

// ── File upload ────────────────────────────────────────
document.getElementById('fileInput').addEventListener('change',function(e){
  const file=e.target.files[0];if(!file)return;
  const reader=new FileReader();
  reader.onload=async function(ev){
    const wb=XLSX.read(ev.target.result,{type:'array'});
    const ws=wb.Sheets[wb.SheetNames[0]];
    const rows=XLSX.utils.sheet_to_json(ws,{header:1});
    const parsed=[];
    let start=(rows[0]&&isNaN(Number(rows[0][0])))?1:0;
    for(let i=start;i<rows.length;i++){
      const r=rows[i];if(!r||!r[1])continue;
      parsed.push({no:String(r[0]!=null?r[0]:i),word:String(r[1]||''),meaning:String(r[2]||''),example:String(r[3]||''),translation:String(r[4]||'')});
    }
    const today=todayStr();
    const existing=getDay(today);
    const existingNos=new Set(existing.words.map(function(w){return w.no}));
    const newWords=parsed.filter(function(w){return!existingNos.has(w.no)});
    if(existing.words.length+newWords.length>150){alert('하루 최대 150개까지 저장할 수 있어요.');return}
    existing.words=existing.words.concat(newWords);
    await saveDate(today);
    curDate=today;search='';openIdx=null;revealed={};quizMode=false;
    if(newWords.length<parsed.length){alert(newWords.length+'개 추가됨 (중복 '+(parsed.length-newWords.length)+'개 제외)');}
    render();
  };
  reader.readAsArrayBuffer(file);e.target.value='';
});

// ── Speech (단어만) ────────────────────────────────────
function speak(word, example, e) {
  e.stopPropagation();
  if(!window.speechSynthesis)return;
  window.speechSynthesis.cancel();
  var u1=new SpeechSynthesisUtterance(word);
  u1.lang='en-US';u1.rate=0.85;
  window.speechSynthesis.speak(u1);
}

// ── Calendar ───────────────────────────────────────────
let calYear = new Date().getFullYear();
let calMonth = new Date().getMonth();
let calSelected = null;

function renderCalendar(el) {
  const today = new Date();
  const todayIso = todayStr();
  const firstDay = new Date(calYear, calMonth, 1).getDay();
  const daysInMonth = new Date(calYear, calMonth+1, 0).getDate();
  const monthNames = ['1월','2월','3월','4월','5월','6월','7월','8월','9월','10월','11월','12월'];
  const dayLabels = ['일','월','화','수','목','금','토'];

  let html = '<div class="cal-header">'
    +'<button class="cal-nav" onclick="calPrev()">◀</button>'
    +'<div class="cal-title">'+calYear+'년 '+monthNames[calMonth]+'</div>'
    +'<button class="cal-nav" onclick="calNext()">▶</button>'
    +'</div>'
    +'<div class="cal-grid">';

  dayLabels.forEach(function(d){ html+='<div class="cal-day-label">'+d+'</div>'; });

  for(let i=0;i<firstDay;i++) html+='<div class="cal-day empty"></div>';

  for(let d=1;d<=daysInMonth;d++){
    const iso = calYear+'-'+String(calMonth+1).padStart(2,'0')+'-'+String(d).padStart(2,'0');
    const words = data[iso] ? data[iso].words.length : 0;
    const isToday = iso===todayIso;
    const isSelected = iso===calSelected;
    const hasWords = words>0;
    html+='<div class="cal-day'+(hasWords?' has-words':'')+(isToday?' today':'')+(isSelected?' selected':'')+'" onclick="calSelect(\''+iso+'\')">'
      +'<span>'+d+'</span>'
      +(hasWords?'<span class="cal-count">'+words+'</span>':'')
      +'</div>';
  }
  html+='</div>';

  if(calSelected && data[calSelected] && data[calSelected].words.length>0){
    const words = data[calSelected].words;
    html+='<div class="cal-detail">'
      +'<div class="cal-detail-title">'+calSelected+' · '+words.length+'개</div>';
    words.forEach(function(w){
      html+='<div class="cal-word-item"><span style="font-weight:600">'+w.word+'</span><span style="color:var(--pink)">'+w.meaning+'</span></div>';
    });
    html+='</div>';
  }

  el.innerHTML=html;
}

function calPrev(){ calMonth--; if(calMonth<0){calMonth=11;calYear--;} renderMain(); }
function calNext(){ calMonth++; if(calMonth>11){calMonth=0;calYear++;} renderMain(); }
function calSelect(iso){ calSelected=calSelected===iso?null:iso; renderMain(); }

// ── Widget Export ──────────────────────────────────────
function exportToWidget(){
  const today=todayStr();
  const day=getDay(today);
  if(!day.words||day.words.length===0){
    alert('오늘 단어가 없어요!\n먼저 단어를 추가해주세요.');
    return;
  }
  // Scriptable FileManager에 저장하는 방식:
  // 데이터를 URL 파라미터로 넘겨서 Scriptable 스크립트가 저장하도록 함
  const payload=encodeURIComponent(JSON.stringify(day.words));
  const scriptableURL='scriptable:///run?scriptName=%EB%8B%A8%EC%96%B4%EC%9E%A5_%EC%9C%84%EC%A0%AF&data='+payload;
  window.location.href=scriptableURL;
}
